services:
  - type: web
    name: media-downloader-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: RATE_LIMIT_WINDOW
        value: 15
      - key: RATE_LIMIT_MAX
        value: 20
      - key: MAX_DOWNLOAD_TIMEOUT
        value: 300000
    healthCheckPath: /api/health
    disk:
      name: temp-downloads
      mountPath: /opt/render/project/src/temp
      sizeGB: 1
